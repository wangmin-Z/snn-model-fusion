name: smoke-test

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Run smoke test
        run: python tests/smoke_test.py

      - name: Validate experiment script
        run: |
          bash -n scripts/run_recommended_experiments.sh
          scripts/run_recommended_experiments.sh --dry-run >/dev/null
